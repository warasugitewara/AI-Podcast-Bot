<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎙 AI Podcast Bot</title>
  <style>
    :root {
      --bg:#0d0d14; --surface:#17172280; --surface2:#1e1e2e;
      --border:#2a2a40; --accent:#7c6af7; --accent2:#5de0c4;
      --danger:#f76a6a; --warn:#f5a623; --text:#e2e2f0; --sub:#7878a0;
      --haru:#a78bfa; --ao:#60a5fa; --yuki:#34d399; --sora:#fbbf24; --rei:#f472b6;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    a{color:var(--accent);text-decoration:none}

    /* ── Header ── */
    header{background:var(--surface2);border-bottom:1px solid var(--border);
           padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    header h1{font-size:1.1rem;font-weight:700;flex:1}
    .nim-bar-wrap{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--sub)}
    .nim-bar{width:90px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .nim-bar-fill{height:100%;background:var(--accent2);transition:width .4s}
    .badge{font-size:.72rem;padding:.2rem .55rem;border-radius:99px;background:var(--border);color:var(--sub)}
    .badge.online{background:#1a3a2a;color:var(--accent2)}
    .badge.paused{background:#3a2a1a;color:var(--warn)}

    /* ── Layout ── */
    main{max-width:1100px;margin:1.5rem auto;padding:0 1rem;
         display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .full{grid-column:1/-1}
    @media(max-width:700px){main{grid-template-columns:1fr}}

    /* ── Card ── */
    .card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.1rem}
    .card-title{font-size:.78rem;font-weight:600;color:var(--sub);text-transform:uppercase;
                letter-spacing:.07em;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
    .card-title .count-badge{background:var(--border);color:var(--text);padding:.1rem .4rem;
                              border-radius:6px;font-size:.72rem;font-weight:700}

    /* ── Status ── */
    #status-row{display:flex;align-items:center;gap:.75rem}
    #status-icon{font-size:1.6rem}
    #status-text{font-size:1rem;font-weight:600}
    #status-detail{font-size:.82rem;color:var(--sub);margin-left:auto}
    .pulse{animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    /* クールタイムバー */
    #cooldown-wrap{margin-top:.75rem;display:none}
    #cooldown-label{font-size:.75rem;color:var(--sub);margin-bottom:.3rem;display:flex;justify-content:space-between}
    #cooldown-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    #cooldown-bar{height:100%;background:var(--warn);border-radius:3px;transition:width 1s linear}
    /* フェーズパイプライン */
    #phase-row{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
    .phase-chip{font-size:.72rem;padding:.2rem .6rem;border-radius:99px;
                background:var(--border);color:var(--sub);border:1px solid var(--border);white-space:nowrap}
    .phase-chip.active{background:var(--accent)25;border-color:var(--accent);color:var(--accent)}
    .phase-chip.done  {background:#1a3a2a;border-color:#2a5a3a;color:var(--accent2)}

    /* ── Buttons ── */
    button{cursor:pointer;border:none;border-radius:8px;padding:.55rem 1rem;
           font-size:.85rem;font-weight:500;transition:opacity .15s,transform .08s}
    button:hover{opacity:.85}
    button:active{transform:scale(.97)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-success{background:#1e5c43;color:var(--accent2);border:1px solid #2a7a5a}
    .btn-danger{background:#5c1e1e;color:var(--danger);border:1px solid #7a2a2a}
    .btn-neutral{background:var(--border);color:var(--text)}
    .btn-sm{padding:.35rem .7rem;font-size:.78rem}

    /* ── Form ── */
    .form-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.6rem;align-items:center}
    input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);
                          border-radius:8px;padding:.45rem .7rem;font-size:.85rem}
    input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}
    label{font-size:.8rem;color:var(--sub);white-space:nowrap}
    input[type=range]{accent-color:var(--accent);flex:1}

    /* ── Character Cards ── */
    .char-grid{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:.9rem}
    .char-card{padding:.6rem .85rem;border-radius:10px;border:2px solid transparent;
               min-width:110px;flex:1;transition:border-color .2s}
    .char-card.haru{background:#1a1030;border-color:var(--haru)40}
    .char-card.ao  {background:#0d1e30;border-color:var(--ao)40}
    .char-card.yuki{background:#0d2a1e;border-color:var(--yuki)40}
    .char-card.sora{background:#2a1e0d;border-color:var(--sora)40}
    .char-card.rei {background:#2a0d1e;border-color:var(--rei)40}
    .char-name{font-size:.95rem;font-weight:700;margin-bottom:.15rem}
    .char-card.haru .char-name{color:var(--haru)}
    .char-card.ao   .char-name{color:var(--ao)}
    .char-card.yuki .char-name{color:var(--yuki)}
    .char-card.sora .char-name{color:var(--sora)}
    .char-card.rei  .char-name{color:var(--rei)}
    .char-role{font-size:.72rem;color:var(--sub);margin-bottom:.1rem}
    .char-voice{font-size:.68rem;color:var(--sub);opacity:.7}

    /* ── Cast Buttons ── */
    .cast-btns{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.7rem}
    .cast-btn{padding:.4rem .8rem;border-radius:8px;font-size:.78rem;background:var(--border);
              color:var(--sub);border:1px solid var(--border);cursor:pointer;transition:all .15s}
    .cast-btn:hover{background:var(--border);color:var(--text)}
    .cast-btn.active{background:var(--accent)20;border-color:var(--accent);color:var(--accent)}

    /* ── Music Queue ── */
    #music-queue-list{max-height:140px;overflow-y:auto;margin-bottom:.7rem}
    .music-item{display:flex;align-items:center;gap:.5rem;padding:.35rem .5rem;
                border-radius:6px;font-size:.82rem;border-bottom:1px solid var(--border)}
    .music-item:last-child{border-bottom:none}
    .music-item .mi-icon{color:var(--accent2);font-size:.9rem}
    .music-item .mi-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .music-item .mi-url{color:var(--sub);font-size:.72rem}
    .empty-hint{color:var(--sub);font-size:.8rem;padding:.4rem 0;text-align:center}

    /* ── Trending Panel ── */
    #trending-panel{margin-top:.7rem;border-top:1px solid var(--border);padding-top:.7rem}
    #trending-panel.hidden{display:none}
    .trending-item{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;
                   border-bottom:1px solid var(--border);font-size:.82rem;cursor:pointer}
    .trending-item:hover{background:var(--border)40;border-radius:4px;padding-left:.3rem}
    .trending-item:last-child{border-bottom:none}
    .tr-num{color:var(--sub);font-size:.72rem;min-width:1.5rem;text-align:right}
    .tr-info{flex:1;overflow:hidden}
    .tr-title{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tr-artist{font-size:.72rem;color:var(--sub)}
    .tr-add{color:var(--accent2);font-size:.85rem;padding:.2rem .4rem;
            border-radius:4px;cursor:pointer;background:transparent;border:none}
    .tr-add:hover{background:var(--accent2)20}

    /* ── Log ── */
    #log{background:var(--bg);border:1px solid var(--border);border-radius:8px;
         padding:.6rem;height:160px;overflow-y:auto;font-size:.78rem;font-family:monospace}
    .log-entry{padding:.12rem 0;border-bottom:1px solid var(--border)40;display:flex;gap:.4rem}
    .log-ts{color:var(--sub);flex-shrink:0}
    .log-ev{color:var(--accent2);flex-shrink:0}
    .log-detail{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── Custom Cast Builder ── */
    #custom-cast-panel{margin-top:.8rem;border-top:1px solid var(--border);padding-top:.8rem;display:none}
    .char-sel-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.7rem}
    .char-sel-btn{padding:.35rem .65rem;border-radius:8px;font-size:.78rem;
                  background:var(--border);color:var(--sub);border:1px solid var(--border);
                  cursor:pointer;transition:all .15s;user-select:none}
    .char-sel-btn:hover{color:var(--text)}
    .char-sel-btn.selected{background:var(--accent)25;border-color:var(--accent);color:var(--accent)}
    .char-sel-count{font-size:.75rem;color:var(--sub);margin-bottom:.4rem}

    /* ── Char card extended colors ── */
    .char-card.ken  {background:#2a1a0a;border-color:#f97316 40}
    .char-card.nana {background:#2a1030;border-color:#e879f9 40}
    .char-card.zona {background:#0a2a1a;border-color:#34d399 40}
    .char-card.sayo {background:#1a0a2a;border-color:#a78bfa 40}
    .char-card.shiro{background:#0a1a2a;border-color:#60a5fa 40}
    .char-card.nia  {background:#1a2a0a;border-color:#86efac 40}
    .char-card.maron{background:#2a1a10;border-color:#fb923c 40}
    .char-card.nurse{background:#0a2a2a;border-color:#22d3ee 40}
    .char-card.ken   .char-name{color:#f97316}
    .char-card.nana  .char-name{color:#e879f9}
    .char-card.zona  .char-name{color:#34d399}
    .char-card.sayo  .char-name{color:#a78bfa}
    .char-card.shiro .char-name{color:#60a5fa}
    .char-card.nia   .char-name{color:#86efac}
    .char-card.maron .char-name{color:#fb923c}
    .char-card.nurse .char-name{color:#22d3ee}
    .row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
    .mt{margin-top:.6rem}
    .divider{height:1px;background:var(--border);margin:.7rem 0}
    .tag{font-size:.7rem;padding:.1rem .4rem;border-radius:4px;background:var(--border);color:var(--sub)}
  </style>
</head>
<body>
<header>
  <span>🎙</span>
  <h1>AI Podcast Bot</h1>
  <div class="nim-bar-wrap" id="nim-wrap" title="NIM日次使用量">
    <span>NIM</span>
    <div class="nim-bar"><div class="nim-bar-fill" id="nim-fill" style="width:0%"></div></div>
    <span id="nim-text">--/--</span>
  </div>
  <span class="badge" id="conn-badge">● 接続中...</span>
  <a href="/auth/logout" style="font-size:.78rem;color:var(--sub)">ログアウト</a>
</header>

<main>
  <!-- ステータス (full width) -->
  <div class="card full">
    <div class="card-title">📡 ステータス</div>
    <div id="status-row">
      <span id="status-icon">⏸</span>
      <span id="status-text">待機中</span>
      <span id="status-detail"></span>
    </div>
    <!-- クールタイムバー -->
    <div id="cooldown-wrap">
      <div id="cooldown-label"><span>⏳ 次回生成まで</span><span id="cooldown-sec">--</span></div>
      <div id="cooldown-bar-bg"><div id="cooldown-bar" style="width:0%"></div></div>
    </div>
    <!-- フェーズチップ -->
    <div id="phase-row">
      <span class="phase-chip" id="chip-cooldown">⏳ クールタイム</span>
      <span class="phase-chip" id="chip-generating">💭 台本生成</span>
      <span class="phase-chip" id="chip-tts">🗣 音声生成</span>
      <span class="phase-chip" id="chip-bgm">🔍 BGM取得</span>
      <span class="phase-chip" id="chip-playing">▶ 再生中</span>
      <span id="ep-count" class="tag" style="margin-left:auto" title="エピソード数">Ep.0</span>
    </div>
  </div>

  <!-- ── 左カラム ── -->
  <div>
    <!-- コントロール -->
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">🎤 コントロール</div>
      <div class="form-row">
        <input id="talk-topic" type="text" placeholder="トピック（空欄で自動選択）" style="flex:1">
        <button class="btn-primary" onclick="sendTalk()">📝 話してもらう</button>
      </div>
      <div class="row">
        <button class="btn-success" onclick="sendStart()">▶ 放送開始</button>
        <button class="btn-danger"  onclick="sendStop()">⏹ 停止</button>
        <span id="vc-status" class="tag" style="margin-left:auto"></span>
      </div>
    </div>

    <!-- 音楽キュー -->
    <div class="card">
      <div class="card-title">
        🎵 音楽キュー
        <span class="count-badge" id="music-count">0</span>
        <span class="spacer"></span>
        <button class="btn-sm btn-neutral" onclick="refreshQueue()">↻</button>
      </div>

      <div id="music-queue-list"><div class="empty-hint">キューは空です</div></div>

      <!-- BGM音量スライダー -->
      <div class="form-row mt" style="align-items:center;gap:.6rem">
        <span style="white-space:nowrap;font-size:.85rem">🔊 BGM音量</span>
        <input id="bgm-volume-slider" type="range" min="0" max="200" value="80"
               style="flex:1;accent-color:var(--accent)"
               oninput="onVolumeInput(this.value)"
               onchange="setBgmVolume(this.value)">
        <span id="bgm-volume-label" style="width:3.2rem;text-align:right;font-size:.85rem">80%</span>
      </div>

      <div class="form-row">
        <input id="music-input" type="text"
               placeholder="YouTube URL または 曲名・アーティスト名" style="flex:1">
        <button class="btn-success" onclick="addMusic()">＋ 追加</button>
      </div>
      <div class="row mt">
        <button class="btn-sm btn-neutral" onclick="toggleTrending()">🔥 JPトレンド</button>
        <button class="btn-sm btn-neutral" onclick="addRandomBgm()">🎲 自動選曲</button>
        <span id="trending-status" class="tag" style="display:none">読み込み中...</span>
      </div>

      <div id="trending-panel" class="hidden">
        <div class="divider"></div>
        <div style="font-size:.75rem;color:var(--sub);margin-bottom:.4rem">
          🇯🇵 YouTube Music トレンド TOP20
        </div>
        <div id="trending-list"><div class="empty-hint">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <!-- ── 右カラム ── -->
  <div>
    <!-- キャストパネル -->
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">
        🎭 キャスト
        <span id="cast-name-badge" class="tag">--</span>
        <span class="spacer"></span>
        <button class="btn-sm btn-neutral" onclick="shuffleCast()">🎲</button>
      </div>

      <div class="char-grid" id="char-cards"></div>

      <div class="cast-btns" id="cast-btns"></div>

      <div style="font-size:.75rem;color:var(--sub)" id="cast-desc"></div>

      <!-- カスタムキャストビルダー -->
      <div style="margin-top:.6rem">
        <button class="btn-sm btn-neutral" onclick="toggleCustomBuilder()" id="custom-builder-toggle">
          ✏️ カスタム作成
        </button>
      </div>
      <div id="custom-cast-panel">
        <div class="char-sel-count" id="custom-sel-count">0人選択中 (2〜6人)</div>
        <div class="char-sel-grid" id="custom-char-sel"></div>
        <div class="row">
          <button class="btn-sm btn-success" onclick="applyCustomCast()">✅ 適用</button>
          <button class="btn-sm btn-neutral" onclick="clearCustomSel()">✖ クリア</button>
        </div>
      </div>
    </div>

    <!-- キュー詳細 -->
    <div class="card">
      <div class="card-title">📊 キュー状況</div>
      <div class="row" style="gap:1rem;font-size:.85rem">
        <div>🗣 TTS <span id="q-tts" style="color:var(--accent2);font-weight:700">0</span></div>
        <div>💬 トーク <span id="q-speech" style="color:var(--accent2);font-weight:700">0</span></div>
        <div>🎵 音楽 <span id="q-music" style="color:var(--accent2);font-weight:700">0</span></div>
      </div>
    </div>
  </div>

  <!-- イベントログ (full width) -->
  <div class="card full">
    <div class="card-title">📋 イベントログ</div>
    <div id="log"></div>
  </div>
</main>

<script>
// ─── State ────────────────────────────────────────────────────
const state = {
  cast: null,
  casts: {},
  trending: null,
  trendingOpen: false,
  cooldownTotal: 0,   // クールタイム初期値（秒）
  cooldownTimer: null,
};

// ─── SSE ──────────────────────────────────────────────────────
const badge    = document.getElementById("conn-badge");
const evtSrc   = new EventSource("/events/");
evtSrc.onopen  = () => { badge.textContent="● 接続済み"; badge.className="badge online"; };
evtSrc.onerror = () => { badge.textContent="● 切断"; badge.className="badge"; };
evtSrc.addEventListener("status", e => {
  const d = JSON.parse(e.data);
  updateStatus(d.event, d.detail ?? "");
  appendLog(d.event, d.detail ?? "");
});

// ─── フェーズチップ管理 ────────────────────────────────────────
const PHASE_MAP = {
  cooldown:      "chip-cooldown",
  generating:    "chip-generating",
  tts_generating:"chip-tts",
  bgm_fetching:  "chip-bgm",
  bgm_ready:     "chip-bgm",
  playing:       "chip-playing",
};
function setPhase(ev) {
  const chipId = PHASE_MAP[ev];
  document.querySelectorAll(".phase-chip").forEach(c => {
    c.classList.remove("active","done");
    if (c.id === chipId) c.classList.add("active");
  });
}

// ─── クールタイムバー ─────────────────────────────────────────
let _cdInterval = null;
function startCooldownBar(totalSec) {
  state.cooldownTotal = totalSec;
  const wrap = document.getElementById("cooldown-wrap");
  wrap.style.display = "block";
  const bar  = document.getElementById("cooldown-bar");
  const sec  = document.getElementById("cooldown-sec");
  let left   = totalSec;
  bar.style.width = "100%";
  sec.textContent = `${left}秒`;
  if (_cdInterval) clearInterval(_cdInterval);
  _cdInterval = setInterval(() => {
    left = Math.max(0, left - 1);
    const pct = (left / totalSec) * 100;
    bar.style.width = pct + "%";
    sec.textContent = `${left}秒`;
    if (left <= 0) {
      clearInterval(_cdInterval);
      wrap.style.display = "none";
    }
  }, 1000);
}

// ─── ステータス表示 ────────────────────────────────────────────
const STATUS_MAP = {
  connected:       ["🟢","接続済み"],
  idle:            ["⏸","待機中"],
  playing:         ["▶️","再生中"],
  generating:      ["💭","台本生成中"],
  tts_generating:  ["🗣","音声生成中"],
  bgm_fetching:    ["🔍","音楽取得中"],
  bgm_ready:       ["✅","音楽準備完了"],
  bgm_failed:      ["❌","音楽取得失敗"],
  cooldown:        ["⏳","クールタイム"],
  rate_limited:    ["🚦","レート制限"],
  paused_empty_vc: ["⏸","VC空室停止"],
  vc_empty:        ["👥","空室検知"],
  daily_limit:     ["🔴","日次上限"],
  music_queuing:   ["🎵","音楽キュー中"],
  cast_rotated:    ["🎭","キャスト自動切替"],
};
function updateStatus(ev, detail) {
  const [icon, text] = STATUS_MAP[ev] ?? ["⚙️", ev.replace(/_/g," ")];
  document.getElementById("status-icon").textContent = icon;
  const tEl = document.getElementById("status-text");
  tEl.textContent = text;
  tEl.className = ["playing","tts_generating","bgm_fetching","generating"].includes(ev) ? "pulse" : "";
  document.getElementById("status-detail").textContent = detail;
  setPhase(ev);

  if (ev === "cooldown") {
    const secs = parseInt(detail, 10);
    if (!isNaN(secs) && secs > 0) {
      // 前回のタイマーよりも値が大きければ再スタート（新しいクールタイム開始）
      if (secs > (state.cooldownTotal * 0.9 + 5)) {
        startCooldownBar(secs);
      }
    }
  } else if (ev === "idle" || ev === "playing") {
    // 再生始まったらバーを消す
    document.getElementById("cooldown-wrap").style.display = "none";
    if (_cdInterval) { clearInterval(_cdInterval); _cdInterval = null; }
    state.cooldownTotal = 0;
  }
}

// ─── API ───────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch("/api" + path, opts);
    return await r.json();
  } catch(e) {
    appendLog("error", e.message);
    return null;
  }
}

// ─── コントロール ─────────────────────────────────────────────
async function sendStart() {
  await api("POST", "/talk", { topic: "" });
  appendLog("queued_talk", "放送開始リクエスト");
}
async function sendStop() {
  await api("POST", "/stop", {});
  appendLog("stop_requested", "");
}
async function sendTalk() {
  const topic = document.getElementById("talk-topic").value.trim();
  await api("POST", "/talk", { topic: topic || "" });
  appendLog("queued_talk", topic || "(自動)");
  document.getElementById("talk-topic").value = "";
}
async function addRandomBgm() {
  await api("POST", "/bgm", { query: "", enqueue: true });
  appendLog("queued_bgm", "自動選曲");
}

// ─── 音楽キュー ───────────────────────────────────────────────
async function addMusic() {
  const q = document.getElementById("music-input").value.trim();
  if (!q) return;
  await api("POST", "/music", { query: q, title: q });
  appendLog("queued_music", q);
  document.getElementById("music-input").value = "";
  await refreshQueue();
}

async function refreshQueue() {
  const d = await api("GET", "/queue");
  if (!d) return;
  document.getElementById("music-count").textContent = d.music_count;
  document.getElementById("q-tts").textContent    = d.tts_count;
  document.getElementById("q-speech").textContent = d.speech_count;
  document.getElementById("q-music").textContent  = d.music_count;
  renderMusicQueue(d.music);
}

function renderMusicQueue(items) {
  const el = document.getElementById("music-queue-list");
  if (!items || !items.length) {
    el.innerHTML = '<div class="empty-hint">キューは空です</div>';
    return;
  }
  el.innerHTML = items.map((item, i) => {
    const isUrl = item.query.startsWith("http");
    const title = item.title || item.query;
    return `<div class="music-item">
      <span class="mi-icon">${isUrl ? "🔗" : "🔍"}</span>
      <span class="mi-title" title="${escHtml(item.query)}">${escHtml(title)}</span>
      ${isUrl ? `<span class="mi-url">URL</span>` : ""}
    </div>`;
  }).join("");
}

// ─── トレンド ─────────────────────────────────────────────────
function toggleTrending() {
  const panel = document.getElementById("trending-panel");
  state.trendingOpen = !state.trendingOpen;
  panel.classList.toggle("hidden", !state.trendingOpen);
  if (state.trendingOpen && !state.trending) loadTrending();
}

async function loadTrending() {
  const statusEl = document.getElementById("trending-status");
  statusEl.style.display = "inline";
  statusEl.textContent = "読み込み中...";
  const d = await api("GET", "/trending?country=JP");
  statusEl.style.display = "none";
  if (!d || !d.songs) {
    document.getElementById("trending-list").innerHTML =
      '<div class="empty-hint">取得失敗</div>';
    return;
  }
  state.trending = d.songs;
  renderTrending(d.songs);
}

function renderTrending(songs) {
  const el = document.getElementById("trending-list");
  if (!songs.length) { el.innerHTML = '<div class="empty-hint">データなし</div>'; return; }
  el.innerHTML = songs.map((s, i) => `
    <div class="trending-item" onclick="queueTrending('${escAttr(s.url)}','${escAttr(s.title+' / '+s.artist)}')">
      <span class="tr-num">${i+1}</span>
      <div class="tr-info">
        <div class="tr-title">${escHtml(s.title)}</div>
        <div class="tr-artist">${escHtml(s.artist)}</div>
      </div>
      <button class="tr-add" title="キューに追加">＋</button>
    </div>`).join("");
}

async function queueTrending(url, label) {
  await api("POST", "/music", { query: url, title: label });
  appendLog("queued_music", label);
  await refreshQueue();
}

// ─── キャスト ─────────────────────────────────────────────────
const CHAR_COLORS = {
  haru:"haru", ao:"ao", yuki:"yuki", sora:"sora", rei:"rei",
  ken:"ken", nana:"nana", zona:"zona", sayo:"sayo", shiro:"shiro",
  nia:"nia", maron:"maron", nurse:"nurse",
};

// カスタムキャストビルダー
let _customSelected = new Set();
let _allChars = [];

async function loadCast() {
  const [cast, casts, chars] = await Promise.all([
    api("GET", "/cast"),
    api("GET", "/casts"),
    api("GET", "/chars"),
  ]);
  if (!cast || !casts) return;
  state.cast  = cast;
  state.casts = casts;
  if (chars) _allChars = chars;
  renderCastPanel(cast, casts);
  renderCustomBuilder(chars || []);
}

function renderCastPanel(cast, casts) {
  // Character cards
  const grid = document.getElementById("char-cards");
  grid.innerHTML = cast.characters.map(c => {
    const color = CHAR_COLORS[c.id] || "haru";
    return `<div class="char-card ${color}">
      <div class="char-name">${escHtml(c.name)}</div>
      <div class="char-role">${escHtml(c.role)}</div>
      <div class="char-voice">${escHtml(c.speaker_name || "")}</div>
    </div>`;
  }).join("");

  // Cast name badge
  document.getElementById("cast-name-badge").textContent = cast.cast_label || cast.cast_name;
  document.getElementById("cast-desc").textContent =
    casts[cast.cast_name]?.desc ?? (cast.cast_name === "custom" ? "カスタム編成" : "");

  // Cast preset buttons (スクロール可能なコンテナに変更)
  const btnsEl = document.getElementById("cast-btns");
  btnsEl.innerHTML = Object.entries(casts).map(([key, info]) =>
    `<button class="cast-btn ${key === cast.cast_name ? 'active' : ''}"
       title="${escAttr(info.desc||'')}"
       onclick="setCast('${escAttr(key)}')">${escHtml(info.label)}</button>`
  ).join("") +
    (cast.cast_name === "custom"
      ? `<button class="cast-btn active" title="カスタム編成">✏️ カスタム</button>`
      : "");
}

function renderCustomBuilder(chars) {
  const el = document.getElementById("custom-char-sel");
  if (!chars.length) return;
  el.innerHTML = chars.map(c =>
    `<button class="char-sel-btn ${_customSelected.has(c.id) ? 'selected' : ''}"
       id="sel-${escAttr(c.id)}"
       onclick="toggleCharSel('${escAttr(c.id)}')"
       title="${escAttr(c.style||c.role)}"
     >${escHtml(c.name)}<span style="font-size:.65rem;opacity:.7;display:block">${escHtml(c.role)}</span></button>`
  ).join("");
}

function toggleCustomBuilder() {
  const panel = document.getElementById("custom-cast-panel");
  const visible = panel.style.display !== "none";
  panel.style.display = visible ? "none" : "block";
  document.getElementById("custom-builder-toggle").textContent =
    visible ? "✏️ カスタム作成" : "✖ 閉じる";
}

function toggleCharSel(id) {
  if (_customSelected.has(id)) {
    _customSelected.delete(id);
  } else {
    if (_customSelected.size >= 6) {
      appendLog("custom_cast", "最大6人まで選択できます");
      return;
    }
    _customSelected.add(id);
  }
  const btn = document.getElementById(`sel-${id}`);
  if (btn) btn.classList.toggle("selected", _customSelected.has(id));
  document.getElementById("custom-sel-count").textContent =
    `${_customSelected.size}人選択中 (2〜6人)`;
}

function clearCustomSel() {
  _customSelected.clear();
  document.querySelectorAll(".char-sel-btn").forEach(b => b.classList.remove("selected"));
  document.getElementById("custom-sel-count").textContent = "0人選択中 (2〜6人)";
}

async function applyCustomCast() {
  if (_customSelected.size < 2) {
    appendLog("custom_cast", "2人以上選択してください");
    return;
  }
  const ids = [..._customSelected];
  const d = await api("POST", "/cast/custom", { char_ids: ids });
  if (d?.ok) {
    appendLog("cast_custom", ids.join(", "));
    await loadCast();
    toggleCustomBuilder();
    clearCustomSel();
  } else {
    appendLog("cast_error", d?.error || "エラー");
  }
}

async function setCast(name) {
  const d = await api("POST", "/cast", { name });
  if (d?.ok) { await loadCast(); appendLog("cast_changed", name); }
}
async function shuffleCast() {
  const d = await api("POST", "/shuffle", {});
  if (d?.ok) { await loadCast(); appendLog("cast_shuffled", ""); }
}

// ─── NIM使用状況 ─────────────────────────────────────────────
async function loadNimUsage() {
  const d = await api("GET", "/nim-usage");
  if (!d) return;
  const pct = Math.min(100, (d.used / d.limit) * 100);
  document.getElementById("nim-fill").style.width = pct + "%";
  document.getElementById("nim-fill").style.background =
    pct > 80 ? "var(--danger)" : pct > 60 ? "var(--warn)" : "var(--accent2)";
  document.getElementById("nim-text").textContent = `${d.used}/${d.limit}`;
  document.getElementById("nim-wrap").title =
    `NIM日次使用量: ${d.used}/${d.limit} (残${d.remaining}件)`;
}

// ─── ログ ─────────────────────────────────────────────────────
function appendLog(event, detail) {
  const log = document.getElementById("log");
  const el  = document.createElement("div");
  el.className = "log-entry";
  const ts = new Date().toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-ev">${escHtml(event)}</span><span class="log-detail">${escHtml(detail)}</span>`;
  log.prepend(el);
  if (log.children.length > 150) log.lastElementChild?.remove();
}

// ─── ユーティリティ ──────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s) {
  return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// キーボードショートカット
document.getElementById("music-input").addEventListener("keydown", e => {
  if (e.key === "Enter") addMusic();
});
document.getElementById("talk-topic").addEventListener("keydown", e => {
  if (e.key === "Enter") sendTalk();
});

// ─── BGM音量 ─────────────────────────────────────────────────
function onVolumeInput(val) {
  document.getElementById("bgm-volume-label").textContent = `${val}%`;
}
async function setBgmVolume(val) {
  const volume = parseFloat(val) / 100;
  await api("POST", "/bgm-volume", { volume });
}
async function loadBgmVolume() {
  try {
    const r = await api("GET", "/bgm-volume");
    const pct = Math.round((r.volume ?? 0.8) * 100);
    document.getElementById("bgm-volume-slider").value = pct;
    document.getElementById("bgm-volume-label").textContent = `${pct}%`;
  } catch (_) {}
}

// ─── ポーリング ───────────────────────────────────────────────
async function poll() {
  await Promise.all([refreshQueue(), loadNimUsage()]);
}

// ─── 初期化 ───────────────────────────────────────────────────
(async () => {
  await Promise.all([loadCast(), poll(), loadBgmVolume()]);
  setInterval(poll, 10_000);
  setInterval(loadCast, 30_000);
})();
</script>
