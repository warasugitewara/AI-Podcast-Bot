services:
  voicevox:
    image: voicevox/voicevox_engine:nvidia-ubuntu20.04-latest
    container_name: voicevox-engine
    restart: unless-stopped
    ports:
      - "50021:50021"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
